name: QA Feedback

on:
  push:
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  qa-feedback:
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pylint pytest-json-report
          pip install -r requirements.txt

      - name: Run pytest and collect results
        continue-on-error: true
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: |
          python -m pytest . --json-report --json-report-file=qa-pytest-report.json --continue-on-collection-errors

      - name: Run pylint and collect score
        continue-on-error: true
        run: |
          python -m pylint $(git ls-files '*.py') --exit-zero --score=y > qa-pylint-report.txt

      - name: Create QA summary
        if: always()
        run: |
          echo "## QA Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Pytest Results" >> $GITHUB_STEP_SUMMARY

          python - <<'PY' >> $GITHUB_STEP_SUMMARY
          import json

          try:
              with open("qa-pytest-report.json") as f:
                  report = json.load(f)

              summary = report["summary"]
              passed = summary.get("passed", 0)
              failed = summary.get("failed", 0)
              skipped = summary.get("skipped", 0)
              total = passed + failed + skipped

              pass_percent = (passed / total * 100) if total > 0 else 0

              print(f"- Passed: {passed}")
              print(f"- Failed: {failed}")
              print(f"- Skipped: {skipped}")
              print(f"- Pass rate: {pass_percent:.2f}%")
          except Exception as e:
              print(f"Error reading pytest report: {e}")
          PY

          echo "" >> $GITHUB_STEP_SUMMARY

      - name: Add pylint score
        if: always()
        run: |
          SCORE=$(grep -oP 'Your code has been rated at \K[0-9\.]+' qa-pylint-report.txt || echo "Unavailable")
          
          if [ -z "$SCORE" ]; then
            SCORE="Unavailable"
          fi

          echo "### Pylint Results" >> $GITHUB_STEP_SUMMARY
          echo "- Score: $SCORE / 10" >> $GITHUB_STEP_SUMMARY